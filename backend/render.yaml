services:
  - type: web
    name: ndlovukazi-api
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push && npm run seed
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PROVIDER
        value: postgresql
      - key: DATABASE_URL
        fromDatabase:
          name: ndlovukazi-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://your-app.vercel.app   # ← Update this
      - key: RESEND_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: ADMIN_EMAIL
        value: admin@ndlovukazi.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        value: Nokuthula Ndlovu
      - key: GOOGLE_CALLBACK_URL
        value: https://ndlovukazi-api.onrender.com/api/auth/google/callback
      - key: GITHUB_CALLBACK_URL
        value: https://ndlovukazi-api.onrender.com/api/auth/github/callback

databases:
  - name: ndlovukazi-db
    databaseName: ndlovukazi
    user: ndlovukazi
    plan: free
